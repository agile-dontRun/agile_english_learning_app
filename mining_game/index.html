<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ore Collection Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="achievements-container">
        <div class="gallery-header">
            <h1>💎 Ore Collection Museum</h1>
            <p>A tribute to your mining journey achievements</p>
            <div class="global-progress">
                <span>Total Collection Progress: <strong id="progress-text">0/8</strong></span>
                <div class="progress-bar-bg">
                    <div id="progress-fill" class="progress-bar-fill"></div>
                </div>
            </div>
        </div>

        <div id="achievements-grid" class="achievements-grid">
        </div>

        <div class="controls">
            <button class="btn reset-btn" onclick="resetAchievements()">Reset Progress</button>
            <button class="btn test-btn" onclick="simulateUnlock()">Unlock One Randomly (Test)</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
