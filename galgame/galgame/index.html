<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freshman Survival Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 游戏主容器 -->
    <div id="game-container">
        <!-- 背景图：注意这里只写 assets/图片名.jpg -->
        <img id="bg-image" src="../frontend/assets/scene1/lobby1.jpg" alt="Background">
        
        <!-- 人物立绘 -->
        <img id="character-sprite" src="../frontend/assets/karen.png" alt="Character">
        
        <!-- 导师乱入时的黑色半透明遮罩 -->
        <div id="mentor-overlay" class="hidden"></div>
        <!-- 导师立绘 -->
        <img id="mentor-sprite" class="hidden" src="https://via.placeholder.com/300x500/FF6347/ffffff?text=Mentor" alt="Mentor">

        <!-- ====== 🌟 [新增开始]：校园主界面 (Home Page) ====== -->
        <!-- 背景图换成你第一张图的名字 -->
        <div id="home-screen" class="hidden" style="background-image: url('../frontend/assets/home_page/home_bg.jpg');">
            <div class="home-column">
                <div class="col-title">活 动</div>
                <button class="home-btn" onclick="startStory([].concat(chapter1, chapter2, chapter3))">重温：新生见面会</button> 
                <button class="home-btn" onclick="alert('音乐节暂未开放')">音乐节</button> 
            </div>
            <div class="home-column">
                <div class="col-title">游 戏</div>
                <button class="home-btn highlight-btn" onclick="goToFloor6()">6楼</button>
                <button class="home-btn" onclick="window.location.href='../canteen_game/index.php'">食堂小游戏</button>
            </div>
            <div class="home-column">
                <div class="col-title">场 景</div>
                <!-- 重点：点击这里，加载第四章剧情！ -->
                <button class="home-btn" onclick="goToScenario('../frontend/assets/scene5/canteen.jpg', chapter5)">食堂</button>
                <button class="home-btn" onclick="goToScenario('../frontend/assets/scene4/starbucks.jpg', chapter4)">咖啡厅</button>
            </div>
        </div>
        <!-- ====== 🌟 [新增结束] ====== -->

         <!-- ====== 🌟 [新增开始]：六楼游戏大厅 (6th Floor) ====== -->
        <!-- 背景图换成你第二张图的名字 -->
        <div id="floor6-screen" class="hidden" style="background-image: url('../frontend/assets/home_page/6f_bg.jpg');">
            <div class="interactive-zone" onclick="launchGame('miner')">
                <div class="zone-text">进入<br>挖矿世界</div>
            </div>
        <!-- 中间：🎭 礼堂游戏 (指向同学的 index.php) -->
            <div class="interactive-zone" onclick="window.location.href='../stage_game/index.php'">
                <div class="zone-text">进入<br>礼堂挑战</div>
            </div>
            <div class="interactive-zone" onclick="launchGame('match')">
                <div class="zone-text">进入<br>翻牌对战</div>
            </div>
            <button id="back-to-home-btn" onclick="goToHome()">返回校园大门</button>
        </div>
        <!-- ====== 🌟 [新增结束] ====== -->

        <!-- 对话框 -->
        <div id="dialogue-box">
            <!-- 头像容器 -->
            <div id="speaker-avatar-box">
                <!-- 默认头像 -->
                <img id="speaker-avatar" src="https://via.placeholder.com/80/ffffff/000000?text=Me" alt="Avatar">
            </div>
            
            <!-- 文字内容 (这一层非常重要，不要漏掉) -->
            <div id="text-content">
                <div id="speaker-name">旁白</div>
                <div id="dialogue-text">点击继续...</div>
            </div>
            
            <div id="next-indicator">▼</div>
        </div>

        <!-- 选项面板 -->
        <div id="options-container" class="hidden">
            <!-- 按钮会通过 JS 动态生成 -->
        </div>
    </div>
    <script src="story_chapter1.js"></script> 
    <script src="story_chapter2.js"></script> 
    <script src="story_chapter3.js"></script> 
    <script src="story_chapter4.js"></script> 
    <script src="story_chapter5.js"></script>
    <script src="script.js"></script>
</body>
</html>
