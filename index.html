<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freshman Survival Guide</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game-container">
      <img
        id="bg-image"
        src="../frontend/assets/scene1/lobby1.jpg"
        alt="Background"
      />

      <img
        id="character-sprite"
        src="../frontend/assets/karen.png"
        alt="Character"
      />

      <div id="mentor-overlay" class="hidden"></div>
      <img
        id="mentor-sprite"
        class="hidden"
        src="https://via.placeholder.com/300x500/FF6347/ffffff?text=Mentor"
        alt="Mentor"
      />

      <div
        id="home-screen"
        class="hidden"
        style="background-image: url('../frontend/assets/home_page/home_bg.jpg')"
      >
        <div class="home-column">
          <div class="col-title">Activity</div>
          <button class="home-btn" onclick="startStory(prologueData, false)">
            Review: Freshman Meeting
          </button>
          <button class="home-btn" onclick="alert('Coming soon')">
            music festival
          </button>
        </div>

        <div class="home-column">
          <div class="col-title">Games</div>
          <button class="home-btn" onclick="goToFloor6()">
            6th floor of DIICSU college
          </button>
          <button
            class="home-btn"
            onclick="window.location.href = '../canteen_game/index.php'"
          >
            Cafeteria mini games
          </button>
          <button
            class="home-btn"
            onclick="window.location.href = '../word/index.html'"
          >
            Word Hunter
          </button>
        </div>

        <div class="home-column">
          <div class="col-title">daily scenes</div>
          <button
            class="home-btn"
            onclick="goToScenario('../frontend/assets/scene5/canteen.jpg', chapter5)"
          >
            Cafeteria (after freshman meeting)
          </button>
          <button
            class="home-btn"
            onclick="goToScenario('../frontend/assets/scene4/starbucks.jpg', chapter4)"
          >
            coffee house
          </button>
        </div>

        <button
          id="back-to-main-site-btn"
          onclick="window.location.href = '../../home.php'"
        >
          Return to English learning website
        </button>

        <button
          id="home-avatar-entry"
          onclick="window.location.href = '../dress_up_game/dress_up_index.php?return=/galgame/galgame/index.html'"
          aria-label="Open dress up game"
        >
          <div id="home-avatar-stage">
            <div id="home-avatar-empty">Dress Up</div>
          </div>
          <span id="home-avatar-label">Dress Up</span>
        </button>
      </div>

      <div
        id="floor6-screen"
        class="hidden"
        style="background-image: url('../frontend/assets/home_page/6f_bg.jpg')"
      >
        <div class="interactive-zone" onclick="launchGame('miner')">
          <div class="zone-text">Enter<br />Gold Word Miner</div>
        </div>
        <div
          class="interactive-zone"
          onclick="window.location.href = '../stage_game/index.php'"
        >
          <div class="zone-text">Enter<br />auditorium</div>
        </div>
        <div class="interactive-zone" onclick="launchGame('match')">
          <div class="zone-text">Enter<br />Flip Card Memory Challenge</div>
        </div>
        <div
          class="interactive-zone"
          style="background: linear-gradient(135deg, #667eea, #764ba2); border: 2px solid gold"
          onclick="window.location.href = '../word/index.html'"
        >
          <div class="zone-text">Enter<br />Word Hunter</div>
        </div>
        <button id="back-to-home-btn" onclick="goToHome()">
          Return to the campus gate
        </button>
      </div>

      <div id="dialogue-box">
        <div id="speaker-avatar-box">
          <img
            id="speaker-avatar"
            src="https://via.placeholder.com/80/ffffff/000000?text=Me"
            alt="Avatar"
          />
        </div>
        <div id="text-content">
          <div id="speaker-name">Narration</div>
          <div id="dialogue-text">Click to continue ..</div>
        </div>
        <div id="next-indicator">▶</div>
      </div>

      <div id="options-container" class="hidden"></div>
    </div>
    <script src="story_chapter1.js"></script>
    <script src="story_chapter2.js"></script>
    <script src="story_chapter3.js"></script>
    <script src="story_chapter4.js"></script>
    <script src="story_chapter5.js"></script>
    <script src="script.js"></script>
  </body>
</html>
